<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>轻健记 · 本地单文件 Demo</title>
  <style>
    :root {
      --bg: #edf2f7;
      --phone: #ffffff;
      --text: #1f2937;
      --sub: #6b7280;
      --line: #e5e7eb;
      --primary: #0f9f75;
      --warn: #d97706;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #e6f6f0, #edf2f7 120px);
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    .phone {
      width: min(100%, 420px);
      height: min(92vh, 860px);
      background: var(--phone);
      border: 1px solid #d1d5db;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 22px 50px rgba(15, 23, 42, .15);
      display: flex;
      flex-direction: column;
    }
    .topbar {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .topbar h1 { margin: 0; font-size: 20px; }
    .topbar p { margin: 4px 0 0; color: var(--sub); font-size: 12px; }
    .content { flex: 1; overflow: auto; padding: 12px; padding-bottom: 88px; }
    .panel { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 12px; margin-bottom: 10px; }
    .panel h2 { margin: 0; font-size: 16px; }
    .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .metric-card { border: 1px solid var(--line); border-radius: 10px; padding: 8px; background: #fbfdfc; }
    .metric-card b { display: block; font-size: 13px; margin-bottom: 4px; }
    .metric-card strong { font-size: 14px; }
    .row { margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px; }
    input, select, button { font: inherit; }
    input, select {
      height: 40px; padding: 0 10px;
      border: 1px solid var(--line); border-radius: 10px;
      background: #fff;
    }
    .row.inline { flex-direction: row; }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      height: 38px;
      padding: 0 12px;
      cursor: pointer;
    }
    .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .tabs { display: none; gap: 8px; margin-bottom: 8px; }
    .tab-btn { flex: 1; height: 36px; border: 1px solid var(--line); background: #fff; border-radius: 8px; }
    .tab-btn.active { border-color: var(--primary); color: var(--primary); background: #ecfdf5; }
    .section { display: none; }
    .section.active { display: block; }
    .list { list-style: none; margin: 0; padding: 0; }
    .list li { border-bottom: 1px dashed var(--line); padding: 8px 0; font-size: 13px; }
    .tag { border-radius: 999px; padding: 1px 7px; color: #fff; font-size: 11px; margin-left: 6px; }
    .tag.ok { background: var(--primary); }
    .tag.warn { background: var(--warn); }
    .tag.danger { background: var(--danger); }
    .bottom-nav {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      border-top: 1px solid var(--line);
      background: #fff;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      height: 64px;
    }
    .nav-btn { border: 0; background: transparent; color: var(--sub); font-size: 12px; }
    .nav-btn.active { color: var(--primary); font-weight: 600; }
    .hint { color: var(--sub); font-size: 12px; }
    .toast { position: fixed; bottom: 18px; right: 18px; background: #111827; color: #fff; padding: 8px 10px; border-radius: 8px; opacity: 0; transform: translateY(8px); transition: .2s; }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="phone">
    <header class="topbar">
      <h1>轻健记</h1>
      <p>离线版：双击 index.html 即可演示</p>
    </header>

    <main class="content">
      <section id="sec-home" class="section active">
        <div class="panel">
          <div class="panel-head"><h2>今日概览</h2><span id="todayDate" class="hint"></span></div>
          <div id="metricCards" class="metrics"></div>
        </div>
        <div class="panel">
          <div class="panel-head"><h2>快捷操作</h2></div>
          <button id="gotoRecord" class="btn primary">去记录</button>
        </div>
      </section>

      <section id="sec-record" class="section">
        <div class="panel">
          <div class="panel-head"><h2>随手记录</h2><span class="hint">仅本地存储</span></div>
          <form id="recordForm">
            <div class="row"><label>指标</label><select id="metricType"><option value="headache">头痛/头晕</option><option value="blood_pressure">血压</option><option value="blood_glucose">血糖</option><option value="weight">体重</option><option value="heart_rate">心率</option></select></div>
            <div id="dynamicFields"></div>
            <div class="row"><label>备注</label><input id="note" maxlength="40" placeholder="例如：午后头晕" /></div>
            <div class="row inline"><button class="btn primary" type="submit">保存</button><button class="btn" type="button" id="resetBtn">清空</button></div>
          </form>
        </div>
      </section>

      <section id="sec-trend" class="section">
        <div class="panel"><div class="panel-head"><h2>近 7 天趋势（示意）</h2></div><ul id="trendList" class="list"></ul></div>
      </section>

      <section id="sec-me" class="section">
        <div class="panel"><div class="panel-head"><h2>最近记录</h2><button id="exportBtn" class="btn">导出 JSON</button></div><ul id="recordList" class="list"></ul></div>
        <div class="panel"><p class="hint">⚠️ 仅演示用途，不构成医疗诊断建议。</p></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-target="home">首页</button>
      <button class="nav-btn" data-target="record">记录</button>
      <button class="nav-btn" data-target="trend">趋势</button>
      <button class="nav-btn" data-target="me">我的</button>
    </nav>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_KEY = 'health_demo_records_v2';
    const metricLabels = { headache: '头痛/头晕', blood_pressure: '血压', blood_glucose: '血糖', weight: '体重', heart_rate: '心率' };
    let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    const metricType = document.getElementById('metricType');
    const dynamicFields = document.getElementById('dynamicFields');

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function switchTab(name) {
      document.querySelectorAll('.nav-btn').forEach((b) => b.classList.toggle('active', b.dataset.target === name));
      document.querySelectorAll('.section').forEach((s) => s.classList.remove('active'));
      document.getElementById(`sec-${name}`).classList.add('active');
      document.querySelector('.content').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderFields() {
      const t = metricType.value;
      const fieldMap = {
        headache: '<div class="row"><label>程度（1-10）</label><input id="valueA" type="number" min="1" max="10" required></div><div class="row"><label>持续时长（分钟）</label><input id="valueB" type="number" min="1" max="600" required></div>',
        blood_pressure: '<div class="row"><label>收缩压 mmHg</label><input id="valueA" type="number" min="60" max="260" required></div><div class="row"><label>舒张压 mmHg</label><input id="valueB" type="number" min="40" max="160" required></div>',
        blood_glucose: '<div class="row"><label>血糖 mmol/L</label><input id="valueA" type="number" min="2" max="35" step="0.1" required></div>',
        weight: '<div class="row"><label>体重 kg</label><input id="valueA" type="number" min="20" max="250" step="0.1" required></div>',
        heart_rate: '<div class="row"><label>心率 bpm</label><input id="valueA" type="number" min="30" max="220" required></div>'
      };
      dynamicFields.innerHTML = fieldMap[t];
    }

    function riskTag(item) {
      if (item.type === 'blood_pressure') {
        if (item.valueA >= 140 || item.valueB >= 90) return 'danger';
        if (item.valueA >= 130 || item.valueB >= 85) return 'warn';
      }
      if (item.type === 'blood_glucose') {
        if (item.valueA >= 11.1) return 'danger';
        if (item.valueA >= 7.8) return 'warn';
      }
      if (item.type === 'heart_rate') {
        if (item.valueA >= 120 || item.valueA < 45) return 'danger';
        if (item.valueA >= 100) return 'warn';
      }
      return 'ok';
    }

    function formatValue(item) {
      if (item.type === 'blood_pressure') return `${item.valueA}/${item.valueB} mmHg`;
      if (item.type === 'headache') return `程度${item.valueA}，${item.valueB}分钟`;
      if (item.type === 'blood_glucose') return `${item.valueA} mmol/L`;
      if (item.type === 'weight') return `${item.valueA} kg`;
      if (item.type === 'heart_rate') return `${item.valueA} bpm`;
      return '-';
    }

    function render() {
      const keys = Object.keys(metricLabels);
      document.getElementById('metricCards').innerHTML = keys.map((k) => {
        const rec = records.find((r) => r.type === k);
        return `<div class="metric-card"><b>${metricLabels[k]}</b><strong>${rec ? formatValue(rec) : '暂无'}</strong></div>`;
      }).join('');

      document.getElementById('recordList').innerHTML = records.slice(0, 12).map((r) => {
        const tag = riskTag(r);
        const tagText = tag === 'danger' ? '异常' : tag === 'warn' ? '关注' : '正常';
        return `<li><b>${metricLabels[r.type]}</b>：${formatValue(r)} <span class="tag ${tag}">${tagText}</span><br><small>${new Date(r.time).toLocaleString()}${r.note ? ` · ${r.note}` : ''}</small></li>`;
      }).join('') || '<li>暂无记录</li>';

      document.getElementById('trendList').innerHTML = records.slice(0, 7).map((r) => `<li>${metricLabels[r.type]}：${formatValue(r)}（${new Date(r.time).toLocaleDateString()}）</li>`).join('') || '<li>暂无趋势数据</li>';
    }

    document.getElementById('recordForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const valueA = Number(document.getElementById('valueA')?.value);
      const valueB = Number(document.getElementById('valueB')?.value || 0);
      const note = document.getElementById('note').value.trim();
      records.unshift({ type: metricType.value, valueA, valueB, note, time: Date.now() });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      render();
      showToast('保存成功');
      switchTab('home');
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('recordForm').reset();
      metricType.value = 'headache';
      renderFields();
    });

    document.getElementById('gotoRecord').addEventListener('click', () => switchTab('record'));
    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'health-records-demo.json';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    metricType.addEventListener('change', renderFields);
    document.querySelectorAll('.nav-btn').forEach((btn) => btn.addEventListener('click', () => switchTab(btn.dataset.target)));

    document.getElementById('todayDate').textContent = new Date().toLocaleDateString('zh-CN');
    renderFields();
    render();
  </script>
</body>
</html>
