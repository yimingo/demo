<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>轻健记 · 健康管理 Demo</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>轻健记</h1>
        <p>30 秒完成每日健康记录</p>
      </div>
      <button id="quickRecordBtn" class="btn primary">快速记录</button>
    </header>

    <main class="content-grid">
      <section class="panel overview">
        <div class="panel-head">
          <h2>今日概览</h2>
          <span id="todayDate"></span>
        </div>
        <div class="metrics" id="metricCards"></div>
      </section>

      <section class="panel form-panel">
        <div class="panel-head">
          <h2>随手记录</h2>
          <span class="hint">仅本地演示，不上传云端</span>
        </div>

        <form id="recordForm">
          <div class="row">
            <label>指标</label>
            <select id="metricType" required>
              <option value="headache">头痛/头晕</option>
              <option value="blood_pressure">血压</option>
              <option value="blood_glucose">血糖</option>
              <option value="weight">体重</option>
              <option value="heart_rate">心率</option>
            </select>
          </div>

          <div id="dynamicFields"></div>

          <div class="row">
            <label>备注（可选）</label>
            <input id="note" type="text" maxlength="40" placeholder="例如：熬夜后头晕" />
          </div>

          <div class="row inline">
            <button type="submit" class="btn primary">保存记录</button>
            <button type="button" id="resetBtn" class="btn">清空</button>
          </div>
        </form>
      </section>

      <section class="panel trends">
        <div class="panel-head">
          <h2>近 7 天趋势（示意）</h2>
        </div>
        <div id="trendList" class="trend-list"></div>
      </section>

      <section class="panel records">
        <div class="panel-head">
          <h2>最近记录</h2>
          <button id="exportBtn" class="btn">导出 JSON</button>
        </div>
        <ul id="recordList" class="record-list"></ul>
      </section>
    </main>

    <footer class="footer-note">
      <p>⚠️ 本 Demo 仅用于产品演示，不构成医疗诊断建议。</p>
      <p>隐私示例：仅 localStorage 存储、无第三方 SDK、无埋点上报。</p>
    </footer>
  </div>

  <div id="toast" class="toast"></div>
  <script src="./script.js"></script>
</body>
</html>
